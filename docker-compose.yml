services:
  postgres:
    image: postgres:16-alpine
    container_name: yoayudo_postgres
    environment:
      POSTGRES_USER: yoayudo
      POSTGRES_PASSWORD: yoayudo
      POSTGRES_DB: yoayudo
    ports:
      - "5433:5432"
    volumes:
      - yoayudo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yoayudo -d yoayudo"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  yoayudo_postgres_data:
